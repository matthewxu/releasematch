{# ReleaseMatch 全局页头片段 #}
{# @partial header.html — 顶栏导航，供 base.html include #}
<header class="rm-header" role="banner">
  <div class="rm-container rm-header__inner">
    <a class="rm-logo" href="/" aria-label="ReleaseMatch 首页">
      <span class="rm-logo__mark" aria-hidden="true">RM</span>
      <span>ReleaseMatch</span>
    </a>

    <nav class="rm-nav" aria-label="主导航">
      <a class="rm-nav__link{% if nav_active == 'home' %} rm-nav__link--active{% endif %}" href="/">首页</a>
      <a class="rm-nav__link{% if nav_active == 'how' %} rm-nav__link--active{% endif %}" href="/trust/how-matching-works/">对版说明</a>
      <a class="rm-nav__link{% if nav_active == 'about' %} rm-nav__link--active{% endif %}" href="/trust/about/">关于</a>
    </nav>

    <button
      class="rm-header__toggle"
      type="button"
      aria-label="打开菜单"
      aria-expanded="false"
      data-rm-nav-toggle
    >
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
  </div>

  <nav class="rm-nav-mobile" data-rm-nav-mobile aria-label="移动端导航">
    <a class="rm-nav__link" href="/">首页</a>
    <a class="rm-nav__link" href="/trust/how-matching-works/">对版说明</a>
    <a class="rm-nav__link" href="/trust/about/">关于</a>
  </nav>
</header>
